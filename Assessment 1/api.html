<body>

    <header>

    <nav>
        <ul>
           <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a>

         <main>
        <div class="api-container">
            <h2>📡 API Data Explorer</h2>
            <p>Fetch real data from public APIs with one click.</p>

            <!-- API Buttons -->
            <div class="api-buttons">
                <button class="api-btn" data-api="posts">📝 Get Posts</button>
                <button class="api-btn" data-api="users">👥 Get Users</button>
                <button class="api-btn" data-api="countries">🌍 Get Countries</button>
                <button class="api-btn" data-api="dog">🐕 Random Dog</button>
                <button class="api-btn" data-api="cat">🐱 Random Cat</button>
                <button class="api-btn" data-api="fact">💡 Random Fact</button>
            </div>

            <!-- Search Box (for countries) -->
            <div class="search-box">
                <input type="text" id="country-search" placeholder="Search for a country... e.g., Canada, Japan">
                <button id="search-country">🔍 Search Country</button>
            </div>

            <!-- Status Messages -->
            <div id="status" class="status"></div>

            <!-- Results Area -->
            <div id="results" class="results">
                <p class="placeholder">👈 Click a button above to fetch data from an API!</p>
            </div>
        </div>
    </main>
